name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 3.4.7)'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Xcode version
        run: xcodebuild -version

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Update version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OLD_VER=$(grep -oE 'version: [0-9]+\.[0-9]+\.[0-9]+\+[0-9]+' pubspec.yaml | cut -d' ' -f2)
          BUILD=$(echo "$OLD_VER" | cut -d'+' -f2)
          NEW_BUILD=$((BUILD + 1))
          sed -i '' "s/version: .*/version: ${VERSION}+${NEW_BUILD}/" pubspec.yaml

      - name: Fix iOS deployment target
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/" "$PBXPROJ"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch fl_pip Swift for Flutter SDK compatibility
        run: |
          PIP_FILE="$PUB_CACHE/hosted/pub.dev/fl_pip-3.2.3/ios/Classes/PiPHelper.swift"
          if [ -f "$PIP_FILE" ]; then
            sed -i '' 's/engine?\.viewController = nil/engine.viewController = nil/g' "$PIP_FILE"
            sed -i '' 's/FlutterViewController(engine: engine!/FlutterViewController(engine: engine/g' "$PIP_FILE"
            echo "Patched fl_pip PiPHelper.swift"
          fi

      - name: Install CocoaPods
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r xiaophim-${{ steps.version.outputs.version }}.ipa Payload
          mv xiaophim-${{ steps.version.outputs.version }}.ipa ../../../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: xiaophim-${{ steps.version.outputs.version }}-ios
          path: xiaophim-${{ steps.version.outputs.version }}.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: xiaophim-${{ steps.version.outputs.version }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
