name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.3.6)'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get version from input or tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update version in pubspec.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OLD_VER=$(grep -oE 'version: [0-9]+\.[0-9]+\.[0-9]+\+[0-9]+' pubspec.yaml | cut -d' ' -f2)
          BUILD=$(echo "$OLD_VER" | cut -d'+' -f2)
          NEW_BUILD=$((BUILD + 1))
          NEW_VER="${VERSION}+${NEW_BUILD}"
          sed -i '' "s/version: .*/version: $NEW_VER/" pubspec.yaml
          echo "Updated to version: $NEW_VER"

      - name: Create iOS platform
        run: flutter create --platforms=ios --org com.phimhay .

      - name: Fix iOS deployment target to 15.0
        run: |
          # Podfile
          sed -i '' "s/platform :ios, '.*'/platform :ios, '15.0'/" ios/Podfile
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET' = '.*'/IPHONEOS_DEPLOYMENT_TARGET' = '15.0'/" ios/Podfile
          # project.pbxproj
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/" ios/Runner.xcodeproj/project.pbxproj

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (without signing)
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r xiaophim-${{ steps.version.outputs.version }}.ipa Payload
          mv xiaophim-${{ steps.version.outputs.version }}.ipa ../../../

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaophim-${{ steps.version.outputs.version }}-ios
          path: xiaophim-${{ steps.version.outputs.version }}.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: xiaophim-${{ steps.version.outputs.version }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
