name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.3.6)'
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Get version from input or tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update version in pubspec.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OLD_VER=$(grep -oE 'version: [0-9]+\.[0-9]+\.[0-9]+\+[0-9]+' pubspec.yaml | cut -d' ' -f2)
          BUILD=$(echo "$OLD_VER" | cut -d'+' -f2)
          NEW_BUILD=$((BUILD + 1))
          NEW_VER="${VERSION}+${NEW_BUILD}"
          sed -i '' "s/version: .*/version: $NEW_VER/" pubspec.yaml
          echo "Updated to version: $NEW_VER"

      - name: Fix iOS build settings
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/" "$PBXPROJ"

      - name: Inject Swift Concurrency linker flag
        run: |
          python3 << 'PYEOF'
          pbxproj = "ios/Runner.xcodeproj/project.pbxproj"
          with open(pbxproj) as f:
              content = f.read()
          if "-lswift_Concurrency" not in content:
              old = "ENABLE_BITCODE = NO;"
              new = ('ENABLE_BITCODE = NO;\n'
                     '\t\t\t\tOTHER_LDFLAGS = (\n'
                     '\t\t\t\t\t"$(inherited)",\n'
                     '\t\t\t\t\t"-lswift_Concurrency",\n'
                     '\t\t\t\t);')
              content = content.replace(old, new)
              with open(pbxproj, "w") as f:
                  f.write(content)
              print("OK: injected -lswift_Concurrency")
          else:
              print("OK: flag already present")
          PYEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          if [ -f "Podfile.lock" ]; then
            pod install
          else
            pod install --repo-update
          fi
          cd ..

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA archive
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r xiaophim-${{ steps.version.outputs.version }}.ipa Payload
          mv xiaophim-${{ steps.version.outputs.version }}.ipa ../../../

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaophim-${{ steps.version.outputs.version }}-ios
          path: xiaophim-${{ steps.version.outputs.version }}.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: xiaophim-${{ steps.version.outputs.version }}.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
