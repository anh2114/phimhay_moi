<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episode List Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1A1C21;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }

  .header {
    padding: 60px 5% 0;
  }
  .header h1 {
    color: #fff;
    font-size: 28px;
    font-weight: 800;
  }
  .header .subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 16px;
    margin-top: 6px;
  }
  .header .count {
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .close-btn {
    position: fixed;
    top: 60px;
    right: 5%;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: rgba(255,255,255,0.6);
    font-size: 20px;
  }

  .servers {
    padding: 20px 5% 0;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .server-tab {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.5);
    transition: all 0.15s ease;
  }
  .server-tab:hover {
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.6);
  }
  .server-tab.active {
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.06);
  }
  .server-tab.active:hover {
    border-color: rgba(255,255,255,0.5);
    color: #fff;
  }
  .server-tab .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4CAF50;
  }
  .server-tab.active .dot { background: #4CAF50; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 16px 5% 0;
  }

  .grid {
    padding: 16px 5% 40px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .ep-btn {
    height: 52px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    border: 1px solid rgba(255,255,255,0.13);
  }
  .ep-btn.inactive {
    background: #1E2130;
    color: rgba(255,255,255,0.65);
  }
  .ep-btn.inactive:hover { background: #252840; }
  .ep-btn.active {
    background: linear-gradient(39deg, rgba(254, 207, 89, 1), rgba(255, 241, 204, 1));
    color: #1A1100;
    border-color: #FECF59;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="close-btn">✕</div>
  <div class="header">
    <h1>Danh sách tập</h1>
    <div class="subtitle">Thiên Hương</div>
    <div class="count">☰ 12 tập</div>
  </div>
  <div class="servers">
    <div class="server-tab"><span class="dot"></span> Hà Nội (Thuyết Minh)</div>
    <div class="server-tab active"><span class="dot"></span> Hà Nội (Vietsub)</div>
    <div class="server-tab"><span class="dot"></span> Vietsub #1</div>
  </div>
  <div class="divider"></div>
  <div class="grid" id="grid"></div>
<script>
const grid = document.getElementById('grid');
for (let i = 1; i <= 40; i++) {
  const btn = document.createElement('div');
  btn.className = 'ep-btn ' + (i === 1 ? 'active' : 'inactive');
  btn.textContent = 'Tập ' + i;
  btn.onclick = () => {
    document.querySelectorAll('.ep-btn').forEach(b => b.className = 'ep-btn inactive');
    btn.className = 'ep-btn active';
  };
  grid.appendChild(btn);
}
</script>
</body>
</html>
