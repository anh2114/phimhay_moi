<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Controls - Portrait + Fullscreen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: white; font-family: -apple-system, 'Segoe UI', sans-serif; min-height: 100vh; padding: 30px 20px; }

  h1 { text-align: center; font-size: 18px; color: #f5c518; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #666; font-size: 12px; margin-bottom: 40px; }

  .section-label {
    text-align: center;
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #333, transparent);
    margin: 50px auto;
    max-width: 600px;
  }

  /* ── Shared icon styles ── */
  .icon-btn {
    background: none; border: none; color: rgba(255,255,255,0.85);
    cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { opacity: 0.7; }
  .icon-btn svg { width: 22px; height: 22px; }

  .ctrl-btn {
    background: none; border: none; color: rgba(255,255,255,0.7);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:hover { transform: scale(1.08); }
  .ctrl-btn svg { width: 28px; height: 28px; }

  .ten-btn { position: relative; width: 40px; height: 40px; }
  .ten-btn svg { width: 40px; height: 40px; }
  .ten-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.85); pointer-events: none;
  }

  .play-btn {
    width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.95);
    border: none; color: #000; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 16px rgba(255,255,255,0.15);
  }
  .play-btn:hover { background: #fff; transform: scale(1.06); }
  .play-btn svg { width: 30px; height: 30px; }

  .time {
    font-size: 12px; font-family: 'SF Mono', 'Consolas', monospace;
    color: rgba(255,255,255,0.65); min-width: 46px; font-weight: 500;
  }
  .time.end { text-align: right; }

  .track {
    flex: 1; height: 3px; background: rgba(255,255,255,0.15);
    border-radius: 2px; position: relative; cursor: pointer;
  }
  .track-fill {
    height: 100%; background: rgba(255,255,255,0.8); border-radius: 2px; position: relative;
  }
  .track-thumb {
    position: absolute; right: -7px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    box-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }

  .tool-item {
    display: flex; align-items: center; gap: 7px; background: none; border: none;
    color: rgba(255,255,255,0.8); cursor: pointer; font-size: 13px;
  }
  .tool-item:hover { opacity: 0.7; }
  .tool-item svg { width: 20px; height: 20px; }
  .tool-item.active { color: #f5c518; }

  /* ═══════════════════════════════════════ */
  /* PORTRAIT PLAYER                        */
  /* ═══════════════════════════════════════ */
  .portrait-container {
    max-width: 390px;
    margin: 0 auto;
  }
  .portrait-player {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
  }
  .portrait-player .poster {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  }

  .portrait-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6) 100%);
  }

  /* Portrait: mini controls bar */
  .portrait-controls {
    padding: 0 12px 10px;
  }
  .portrait-timeline {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .portrait-mini-track {
    flex: 1; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px;
  }
  .portrait-mini-fill { height: 100%; background: #f5c518; border-radius: 2px; width: 2%; }
  .portrait-time {
    font-size: 10px; font-family: monospace; color: rgba(255,255,255,0.5);
  }

  .portrait-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .portrait-left { display: flex; align-items: center; gap: 8px; }
  .portrait-right { display: flex; align-items: center; gap: 4px; }

  .p-btn {
    width: 30px; height: 30px; border-radius: 50%; background: transparent;
    border: none; color: rgba(255,255,255,0.8); font-size: 14px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .p-btn:hover { background: rgba(255,255,255,0.1); }
  .p-btn svg { width: 18px; height: 18px; }

  .p-play {
    width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15);
    border: none; color: white; display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(4px);
  }
  .p-play svg { width: 16px; height: 16px; }

  /* Portrait: info section below player */
  .portrait-info {
    background: #0d0d0d;
    border-radius: 0 0 12px 12px;
    padding: 10px 14px;
    margin-top: -1px;
  }
  .portrait-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .portrait-meta { font-size: 11px; color: #666; }

  /* ═══════════════════════════════════════ */
  /* FULLSCREEN LANDSCAPE                  */
  /* ═══════════════════════════════════════ */
  .landscape-container {
    width: 100%; max-width: 820px; margin: 0 auto;
  }
  .landscape-player {
    position: relative; width: 100%; aspect-ratio: 16/9;
    background: #000; border-radius: 12px; overflow: hidden;
  }
  .landscape-player .poster {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  }
  .landscape-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: space-between;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.05) 15%,
      transparent 35%, transparent 65%,
      rgba(0,0,0,0.05) 85%, rgba(0,0,0,0.5) 100%
    );
  }

  /* Fullscreen top bar */
  .fs-top {
    display: flex; align-items: center; padding: 14px 18px; gap: 16px;
  }
  .fs-top-left { display: flex; align-items: center; gap: 14px; }
  .fs-top-center {
    flex: 1; text-align: center; font-size: 15px; font-weight: 500;
    color: rgba(255,255,255,0.9); letter-spacing: 0.3px;
  }
  .fs-top-right { display: flex; align-items: center; gap: 18px; }

  /* Fullscreen center */
  .fs-center {
    display: flex; align-items: center; justify-content: center;
    gap: 32px; padding: 0 40px;
  }

  /* Fullscreen bottom */
  .fs-bottom { padding: 0 18px 14px; }
  .fs-timeline { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .fs-toolbar { display: flex; align-items: center; justify-content: center; gap: 48px; padding-bottom: 4px; }
</style>
</head>
<body>

<h1>🎬 Player Controls Layout</h1>
<p class="subtitle">Portrait (không fullscreen) + Fullscreen landscape</p>

<!-- ═══════════════════════════════════════ -->
<!-- PORTRAIT (NOT FULLSCREEN)              -->
<!-- ═══════════════════════════════════════ -->
<div class="section-label">📱 Portrait — Không Fullscreen</div>

<div class="portrait-container">
  <div class="portrait-player">
    <div class="poster"></div>
    <div class="portrait-overlay">
      <div class="portrait-controls">
        <!-- Timeline mini -->
        <div class="portrait-timeline">
          <span class="portrait-time">00:13</span>
          <div class="portrait-mini-track">
            <div class="portrait-mini-fill"></div>
          </div>
          <span class="portrait-time">1:08:25</span>
        </div>
        <!-- Controls row -->
        <div class="portrait-row">
          <div class="portrait-left">
            <!-- Play/Pause -->
            <button class="p-play">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="4" width="4" height="16" rx="1"/>
                <rect x="14" y="4" width="4" height="16" rx="1"/>
              </svg>
            </button>
            <!-- Rewind 10 -->
            <button class="p-btn" title="Lùi 10s">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
              </svg>
            </button>
            <!-- Forward 10 -->
            <button class="p-btn" title="Tới 10s">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
          </div>
          <div class="portrait-right">
            <!-- Subtitle -->
            <button class="p-btn" title="Phụ đề">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
            <!-- Fullscreen -->
            <button class="p-btn" title="Phóng to" style="color:#f5c518;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
                <path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="portrait-info">
    <div class="portrait-title">Đặc Vụ Kim Tải Khởi Động</div>
    <div class="portrait-meta">Tập Full · Vietsub 4K</div>
  </div>
</div>

<div class="section-divider"></div>

<!-- ═══════════════════════════════════════ -->
<!-- FULLSCREEN LANDSCAPE                  -->
<!-- ═══════════════════════════════════════ -->
<div class="section-label">🖥️ Fullscreen Landscape</div>

<div class="landscape-container">
  <div class="landscape-player">
    <div class="poster"></div>
    <div class="landscape-overlay">

      <!-- TOP BAR -->
      <div class="fs-top">
        <div class="fs-top-left">
          <button class="icon-btn" title="Quay lại">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button class="icon-btn" title="Khóa màn hình">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </button>
        </div>
        <div class="fs-top-center">Đặc Vụ Kim Tải Khởi Động</div>
        <div class="fs-top-right">
          <button class="icon-btn" title="PiP">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 9V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v10c0 1.1.9 2 2 2h4"/>
              <rect width="10" height="7" x="12" y="13" rx="2"/>
            </svg>
          </button>
          <button class="icon-btn" title="AirPlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 17H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-1"/>
              <polygon points="12 15 17 21 7 21 12 15"/>
            </svg>
          </button>
          <button class="icon-btn" title="Danh sách tập">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 5H3"/><path d="M10 12H3"/><path d="M10 19H3"/>
              <path d="M15 12.003a1 1 0 0 1 1.517-.859l4.997 2.997a1 1 0 0 1 0 1.718l-4.997 2.997a1 1 0 0 1-1.517-.86z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- CENTER CONTROLS -->
      <div class="fs-center">
        <button class="ctrl-btn" title="Tập trước">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <button class="ctrl-btn ten-btn" title="Lùi 10s">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          <span class="ten-label">10</span>
        </button>
        <button class="play-btn" title="Phát / Tạm dừng">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        </button>
        <button class="ctrl-btn ten-btn" title="Tới 10s">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <span class="ten-label">10</span>
        </button>
        <button class="ctrl-btn" title="Tập tiếp">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 6h2v12h-2zm-3.5 6L4 6v12z"/>
          </svg>
        </button>
      </div>

      <!-- BOTTOM -->
      <div class="fs-bottom">
        <div class="fs-timeline">
          <span class="time">00:13</span>
          <div class="track">
            <div class="track-fill" style="width:0.3%">
              <div class="track-thumb"></div>
            </div>
          </div>
          <span class="time end">1:08:25</span>
        </div>
        <div class="fs-toolbar">
          <button class="tool-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <path d="M8 21h8"/><path d="M12 17v4"/>
            </svg>
            <span>Tỷ lệ</span>
          </button>
          <button class="tool-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
            <span>Tiếng gốc</span>
          </button>
          <button class="tool-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>Phụ đề</span>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
