name: phimhay_app
description: "Xiao Phim - Xem phim online"
publish_to: 'none'
version: 3.8.4+68

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.2
  cached_network_image: ^3.4.0
  carousel_slider: ^5.0.0
  flutter_cache_manager: ^3.4.1
  shared_preferences: ^2.3.4
  share_plus: ^10.1.4
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  flutter_inappwebview: ^6.1.5
  toastification: ^3.2.0
  media_kit: ^1.2.6
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_ios_video: ^1.1.4
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  url_launcher: ^6.2.5
  wakelock_plus: ^1.1.6
  screen_brightness: ^2.1.11
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  flutter_webrtc: ^1.5.2
  permission_handler: ^12.0.3
  package_info_plus: ^9.0.1
  device_info_plus: 12.3.0
  qr_flutter: ^4.1.0
  liquid_glass_widgets: ^0.21.0
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0D0F14"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg_ui_controls/
    - assets/svg_phimchitiet/
